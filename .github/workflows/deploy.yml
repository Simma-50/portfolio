name: Deploy to Mac

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy using Docker Compose
        run: |
          cd ${{ github.workspace }}
          docker compose up -d --build
          docker image prune -f
